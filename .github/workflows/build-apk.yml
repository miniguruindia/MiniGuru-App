name: Build MiniGuru APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
    
    - name: Setup Android SDK 34
      run: |
        export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
        export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin
        
        yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true
        $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platforms;android-34"
        $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "build-tools;34.0.0"
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.3'
        channel: 'stable'
        cache: false
    
    - name: Clean everything
      working-directory: ./app/miniguru
      run: |
        flutter clean
        rm -rf android/.gradle android/app/build build ~/.gradle/caches
    
    - name: Get dependencies
      working-directory: ./app/miniguru
      run: flutter pub get
    
    - name: Patch flutter_inappwebview plugin
      run: |
        PLUGIN_PATH="$HOME/.pub-cache/hosted/pub.dev/flutter_inappwebview-5.8.0/android"
        
        if [ -d "$PLUGIN_PATH" ]; then
          echo "=== PATCHING flutter_inappwebview ==="
          
          # 1. Add namespace
          if ! grep -q "namespace" "$PLUGIN_PATH/build.gradle"; then
            sed -i '/^android {/a \    namespace "com.pichillilorenzo.flutter_inappwebview"' "$PLUGIN_PATH/build.gradle"
            echo "✓ Added namespace"
          fi
          
          # 2. Disable minification
          if grep -q "minifyEnabled true" "$PLUGIN_PATH/build.gradle"; then
            sed -i 's/minifyEnabled true/minifyEnabled false/g' "$PLUGIN_PATH/build.gradle"
            echo "✓ Disabled minifyEnabled"
          fi
          
          if grep -q "shrinkResources true" "$PLUGIN_PATH/build.gradle"; then
            sed -i 's/shrinkResources true/shrinkResources false/g' "$PLUGIN_PATH/build.gradle"
            echo "✓ Disabled shrinkResources"
          fi
          
          # 3. Show result
          echo "=== PATCHED build.gradle ==="
          grep -A 10 "android {" "$PLUGIN_PATH/build.gradle" | head -20
        else
          echo "WARNING: flutter_inappwebview not found"
        fi
    
    - name: Nuclear option - Delete SDK 35
      run: |
        export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
        sudo rm -rf $ANDROID_SDK_ROOT/platforms/android-35 || true
        sudo rm -rf $ANDROID_SDK_ROOT/build-tools/35.* || true
        sudo rm -rf $ANDROID_SDK_ROOT/build-tools/33.0.1 || true
        
        # Prevent re-installation
        sudo touch $ANDROID_SDK_ROOT/platforms/android-35
        sudo chmod 000 $ANDROID_SDK_ROOT/platforms/android-35 || true
        
        echo "Remaining platforms:"
        ls -la $ANDROID_SDK_ROOT/platforms/ || true
    
    - name: Build APK
      working-directory: ./app/miniguru
      env:
        ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        ANDROID_HOME: /usr/local/lib/android/sdk
      run: flutter build apk --release --no-shrink --no-tree-shake-icons
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: miniguru-apk
        path: app/miniguru/build/app/outputs/flutter-apk/app-release.apk