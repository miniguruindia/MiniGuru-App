name: Build MiniGuru APK

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: 'Backend API URL'
        required: false
        default: 'https://api.miniguru.in'
        type: string
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    steps:
    - name: 📥 Checkout latest code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: ☕ Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'
    
    - name: 🤖 Setup Android SDK
      run: |
        export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
        export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin
        
        echo "📦 Installing Android SDK components..."
        yes | sdkmanager --licenses || true
        sdkmanager "platforms;android-34"
        sdkmanager "build-tools;34.0.0"
        
        echo "✅ Android SDK setup complete"
    
    - name: 🐦 Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.27.4'
        channel: 'stable'
        cache: true
    
    - name: ✏️  Configure API URL
      working-directory: ./app/miniguru
      run: |
        API_URL="${{ github.event.inputs.api_url || 'https://api.miniguru.in' }}"
        echo "🔗 Setting API URL to: $API_URL"
        
        # Update secrets.dart with the API URL
        sed -i "s|const String apiBaseUrl = '.*';|const String apiBaseUrl = '$API_URL';|g" lib/secrets.dart
        
        # Verify the change
        grep "apiBaseUrl" lib/secrets.dart
    
    - name: 🧹 Clean build directory
      working-directory: ./app/miniguru
      run: |
        echo "🧹 Cleaning Flutter and gradle caches..."
        flutter clean
        rm -rf android/.gradle android/app/build build ~/.gradle/caches
        echo "✅ Clean complete"
    
    - name: 📚 Get Flutter dependencies
      working-directory: ./app/miniguru
      run: |
        echo "📥 Getting pub dependencies..."
        flutter pub get
        echo "✅ Dependencies installed"
    
    - name: 🔧 Patch flutter_inappwebview
      run: |
        PLUGIN_PATH="$HOME/.pub-cache/hosted/pub.dev/flutter_inappwebview-5.8.0/android"
        
        if [ -d "$PLUGIN_PATH" ]; then
          echo "✏️  Found flutter_inappwebview at: $PLUGIN_PATH"
          echo ""
          echo "1️⃣  Adding namespace..."
          sed -i '/^android {/a \    namespace "com.pichillilorenzo.flutter_inappwebview"' "$PLUGIN_PATH/build.gradle" || true
          
          echo "2️⃣  Disabling minification..."
          sed -i 's/minifyEnabled true/minifyEnabled false/g' "$PLUGIN_PATH/build.gradle"
          sed -i 's/shrinkResources true/shrinkResources false/g' "$PLUGIN_PATH/build.gradle"
          
          echo "3️⃣  Verifying patch..."
          grep -A 5 "android {" "$PLUGIN_PATH/build.gradle" | head -10
          echo "✅ flutter_inappwebview patched successfully"
        else
          echo "⚠️  flutter_inappwebview not found at $PLUGIN_PATH (this is OK if it's not used)"
        fi
    
    - name: 💣 Remove problematic Android SDK versions
      run: |
        export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
        echo "🗑️  Removing SDK versions that cause conflicts..."
        
        sudo rm -rf $ANDROID_SDK_ROOT/platforms/android-35 || true
        sudo rm -rf $ANDROID_SDK_ROOT/build-tools/35.* || true
        sudo rm -rf $ANDROID_SDK_ROOT/build-tools/33.0.1 || true
        
        # Prevent re-installation
        sudo touch $ANDROID_SDK_ROOT/platforms/android-35
        sudo chmod 000 $ANDROID_SDK_ROOT/platforms/android-35 || true
        
        echo "✅ Cleanup complete. Remaining platforms:"
        ls -la $ANDROID_SDK_ROOT/platforms/ || true
    
    - name: 🚀 Build APK (${{ github.event.inputs.build_type || 'release' }})
      working-directory: ./app/miniguru
      env:
        ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        ANDROID_HOME: /usr/local/lib/android/sdk
      run: |
        BUILD_TYPE="${{ github.event.inputs.build_type || 'release' }}"
        echo "📱 Building APK in $BUILD_TYPE mode..."
        
        if [ "$BUILD_TYPE" = "debug" ]; then
          flutter build apk --debug --no-tree-shake-icons
        else
          flutter build apk --release --no-shrink --no-tree-shake-icons
        fi
        
        echo "✅ APK build complete!"
    
    - name: 📦 Upload APK artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: MiniGuru-APK-${{ github.event.inputs.build_type || 'release' }}-${{ github.run_number }}
        path: app/miniguru/build/app/outputs/flutter-apk/app-*.apk
        retention-days: 30
        if-no-files-found: warn
    
    - name: 📊 Show Build Info
      if: always()
      run: |
        echo "=== BUILD SUMMARY ==="
        echo "Build Type: ${{ github.event.inputs.build_type || 'release' }}"
        echo "API URL: ${{ github.event.inputs.api_url || 'https://api.miniguru.in' }}"
        echo "Build Number: ${{ github.run_number }}"
        echo "Commit: ${{ github.sha }}"
        echo ""
        echo "📁 APK Location:"
        ls -lh app/miniguru/build/app/outputs/flutter-apk/ || echo "❌ APK not found"