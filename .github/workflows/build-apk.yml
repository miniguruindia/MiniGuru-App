name: Build MiniGuru APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: 📥 Checkout repository
      uses: actions/checkout@v4
    
    - name: ☕ Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
    
    - name: 🐦 Setup Flutter (Latest Stable)
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: true
    
    - name: 📦 Get dependencies
      working-directory: ./app/miniguru
      run: |
        flutter --version
        flutter pub get
    
    - name: 🏗️ Build APK
      working-directory: ./app/miniguru
      run: flutter build apk --release
    
    - name: 📤 Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: miniguru-release-apk
        path: app/miniguru/build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30
