name: Build MiniGuru APK

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: 'Backend API URL'
        required: false
        default: 'https://api.miniguru.in'
        type: string
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    steps:
    - name: 📥 Checkout latest code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
    
    - name: ☕ Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'
    
    - name: 🤖 Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'platforms;android-35 build-tools;34.0.0'
        cache-key: 'android-sdk-v1'
    
    - name: 🔧 Configure Android environment
      run: |
        echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
        echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
        echo "📱 Android SDK configured at: $ANDROID_HOME"
        
        # Accept Android SDK licenses
        echo "📋 Accepting Android SDK licenses..."
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
    
    - name: 🐦 Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.27.4'
        channel: 'stable'
        cache: true
    
    - name: 🔍 Verify setup
      run: |
        echo "🔧 Flutter version:"
        flutter --version
        echo ""
        echo "🤖 Android SDK location:"
        echo "ANDROID_HOME: $ANDROID_HOME"
        echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"
        ls -la $ANDROID_HOME/platforms/ || echo "Platforms not found"
        echo ""
        echo "☕ Java version:"
        java -version
    
    - name: ✏️  Configure API URL
      working-directory: ./app/miniguru
      run: |
        API_URL="${{ github.event.inputs.api_url || 'https://api.miniguru.in' }}"
        echo "🔗 Setting API URL to: $API_URL"
        
        # Update secrets.dart with the API URL
        sed -i "s|const String apiBaseUrl = '.*';|const String apiBaseUrl = '$API_URL';|g" lib/secrets.dart
        
        # Verify the change
        grep "apiBaseUrl" lib/secrets.dart
    
    - name: 🧹 Clean build directory
      working-directory: ./app/miniguru
      run: |
        echo "🧹 Cleaning Flutter and gradle caches..."
        flutter clean
        rm -rf android/.gradle android/app/build build ~/.gradle/caches
        echo "✅ Clean complete"
    
    - name: 📚 Get Flutter dependencies
      working-directory: ./app/miniguru
      run: |
        echo "📥 Getting pub dependencies..."
        flutter pub get
        echo "✅ Dependencies installed"
        
        # Verify Flutter project
        echo "🔍 Verifying Flutter project..."
        flutter doctor --android-licenses || true
        flutter doctor
    
    - name: 🚀 Build APK (${{ github.event.inputs.build_type || 'release' }})
      working-directory: ./app/miniguru

      run: |
        BUILD_TYPE="${{ github.event.inputs.build_type || 'release' }}"
        echo "📱 Building APK in $BUILD_TYPE mode..."
        
        if [ "$BUILD_TYPE" = "debug" ]; then
          flutter build apk --debug --no-tree-shake-icons
        else
          flutter build apk --release --no-shrink --no-tree-shake-icons
        fi
        
        echo "✅ APK build complete!"
    
    - name: 📦 Upload APK artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: MiniGuru-APK-${{ github.event.inputs.build_type || 'release' }}-${{ github.run_number }}
        path: app/miniguru/build/app/outputs/flutter-apk/app-*.apk
        retention-days: 30
        if-no-files-found: warn
    
    - name: 📊 Show Build Info
      if: always()
      run: |
        echo "=== BUILD SUMMARY ==="
        echo "Build Type: ${{ github.event.inputs.build_type || 'release' }}"
        echo "API URL: ${{ github.event.inputs.api_url || 'https://api.miniguru.in' }}"
        echo "Build Number: ${{ github.run_number }}"
        echo "Commit: ${{ github.sha }}"
        echo ""
        echo "📁 APK Location:"
        ls -lh app/miniguru/build/app/outputs/flutter-apk/ || echo "❌ APK not found"
        echo ""
        echo "💾 Disk Usage:"
        df -h | grep -E "(Filesystem|overlay|/tmp)" || true