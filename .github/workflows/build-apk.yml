name: Build MiniGuru APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
    
    - name: Setup Android SDK 34 ONLY
      run: |
        export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
        export ANDROID_HOME=/usr/local/lib/android/sdk
        export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin
        
        echo "=== ACCEPTING LICENSES ==="
        yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true
        
        echo "=== INSTALLING SDK 34 ==="
        $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platforms;android-34"
        $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "build-tools;34.0.0"
        
        echo "=== VERIFYING SDK 34 ==="
        if [ -f "$ANDROID_SDK_ROOT/platforms/android-34/android.jar" ]; then
          echo "✓ SDK 34 verified"
        else
          echo "✗ SDK 34 verification FAILED"
          exit 1
        fi
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.3'
        channel: 'stable'
        cache: false
    
    - name: Clean everything
      working-directory: ./app/miniguru
      run: |
        flutter clean
        rm -rf android/.gradle android/app/build build ~/.gradle/caches
    
    - name: Get dependencies
      working-directory: ./app/miniguru
      run: flutter pub get
    
    - name: Fix flutter_inappwebview namespace
      working-directory: ./app/miniguru
      run: |
        PLUGIN_PATH="$HOME/.pub-cache/hosted/pub.dev/flutter_inappwebview-5.8.0/android/build.gradle"
        if [ -f "$PLUGIN_PATH" ]; then
          if ! grep -q "namespace" "$PLUGIN_PATH"; then
            sed -i '/^android {/a \    namespace "com.pichillilorenzo.flutter_inappwebview"' "$PLUGIN_PATH"
            echo "✓ Patched flutter_inappwebview"
          fi
        fi
    
    - name: Delete SDK 35 right before build
      run: |
        export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
        echo "=== REMOVING SDK 35 ==="
        sudo rm -rf $ANDROID_SDK_ROOT/platforms/android-35 || true
        sudo rm -rf $ANDROID_SDK_ROOT/build-tools/35.* || true
        echo "=== REMAINING PLATFORMS ==="
        ls -la $ANDROID_SDK_ROOT/platforms/ || true
    
    - name: Build APK
      working-directory: ./app/miniguru
      env:
        ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        ANDROID_HOME: /usr/local/lib/android/sdk
      run: flutter build apk --release --no-shrink --no-tree-shake-icons
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: miniguru-apk
        path: app/miniguru/build/app/outputs/flutter-apk/app-release.apk