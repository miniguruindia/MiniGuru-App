name: miniguru
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Styling
  cupertino_icons: ^1.0.8
  google_fonts: 6.2.1
  
  # Database & Storage
  sqflite: 2.4.1  
  path: ^1.9.0
  shared_preferences: ^2.3.2

  # Network & API
  http: 1.5.0
  http_parser: ^4.1.2        # ← added (used in MiniguruApi.dart for multipart upload)
  
  # Media 
  image_picker: ^1.0.4
  file_picker: ^8.1.2
  youtube_player_iframe: ^5.1.2
  video_player: ^2.8.3
  
  # Payments
  razorpay_flutter: ^1.4.3       
  
  # Utilities
  intl: ^0.19.0
  permission_handler: ^11.3.1       
  sticky_headers: ^0.3.0+2
  fl_chart: ^0.68.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: "^0.14.3"
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/MGlogo.png
    - assets/bag.png
    - assets/ic_logo.png
    - assets/shopping-cart.png
    - assets/Goine.png
    - assets/pari T-LAB.jpg
    - assets/ananya.png
    - assets/Founder_Pramod.jpg
    - assets/NLM.webp
    - assets/T-LAB.png


flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/MGlogo.png"
  min_sdk_android: 21
